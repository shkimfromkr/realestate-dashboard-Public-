<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 부동산 대시보드</title>
<style>
  :root{
    --bg:#F3F5F7; --surface:#FFFFFF; --ink:#17222C; --sub:#5B6B7A;
    --line:#E2E7EC; --brand:#134A6C;
    --up:#CE4141; --up-bg:#FBEFEF; --down:#2B62B4; --down-bg:#EDF3FB;
    --note:#8A6D1F; --note-bg:#FBF4DF;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.55;
    max-width:560px; margin:0 auto; padding:16px 14px 48px}
  .num{font-family:"SF Mono","Menlo","Consolas",monospace; font-weight:600; letter-spacing:-0.02em}
  header{display:flex; align-items:baseline; justify-content:space-between; margin:6px 2px 14px}
  header h1{font-size:19px; font-weight:700}
  header .asof{font-size:12px; color:var(--sub)}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:12px}
  .eyebrow{font-size:11px; font-weight:600; letter-spacing:0.08em; color:var(--sub); margin-bottom:10px}
  .alert{display:flex; gap:10px; align-items:flex-start; padding:10px 12px; border-radius:10px; margin-bottom:8px; font-size:14px}
  .alert:last-child{margin-bottom:0}
  .alert .tag{flex-shrink:0; font-size:11px; font-weight:700; padding:2px 7px; border-radius:6px; margin-top:2px; color:#fff}
  .alert.up{background:var(--up-bg)} .alert.up .tag{background:var(--up)}
  .alert.down{background:var(--down-bg)} .alert.down .tag{background:var(--down)}
  .alert.note{background:var(--note-bg)} .alert.note .tag{background:var(--note)}
  .apt-head{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px}
  .apt-head h2{font-size:17px; font-weight:700}
  .apt-meta{font-size:12px; color:var(--sub); margin-bottom:14px}
  .pin{font-size:11px; font-weight:600; color:var(--brand); border:1px solid var(--brand); border-radius:999px; padding:2px 9px; white-space:nowrap}
  .area-tabs{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px}
  .area-tabs button{padding:7px 14px; font-size:13px; font-weight:600; font-family:inherit;
    border:1px solid var(--line); border-radius:9px; background:var(--bg); color:var(--sub); cursor:pointer}
  .area-tabs button.on{background:var(--brand); border-color:var(--brand); color:#fff}
  .bigprice{display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; margin-bottom:6px}
  .bigprice .v{font-size:28px}
  .bigprice .lbl{font-size:12px; color:var(--sub)}
  table{width:100%; border-collapse:collapse; font-size:13.5px; margin-top:8px}
  th{font-size:11px; font-weight:600; color:var(--sub); text-align:left; padding:6px 4px; border-bottom:1px solid var(--line)}
  td{padding:8px 4px; border-bottom:1px solid var(--line)}
  tr:last-child td{border-bottom:none}
  td.r,th.r{text-align:right}
  .news{padding:11px 2px; border-bottom:1px solid var(--line)}
  .news:last-child{border-bottom:none}
  .news a{font-size:14.5px; font-weight:600; color:var(--ink); text-decoration:none}
  .news .src{font-size:11px; color:var(--sub); margin-top:4px}
  .chips{display:flex; gap:8px; flex-wrap:wrap}
  .chip{font-size:13px; font-weight:600; background:var(--bg); border:1px solid var(--line); border-radius:999px; padding:6px 13px}
  .hint{font-size:11.5px; color:var(--sub); margin-top:10px}
  .empty{font-size:13px; color:var(--sub); padding:6px 2px}
  footer{font-size:11px; color:var(--sub); text-align:center; margin-top:20px; line-height:1.7}
</style>
</head>
<body>
<header>
  <h1>내 부동산 대시보드</h1>
  <span class="asof num" id="asof"></span>
</header>

<section class="card"><div class="eyebrow">관심 단지 알림</div><div id="alerts" class="empty">불러오는 중…</div></section>
<section class="card" id="apt"></section>
<section class="card"><div class="eyebrow">현재 매물 (호가)</div><div id="listings" class="empty">불러오는 중…</div></section>
<section class="card"><div class="eyebrow">대출 규제 · 정책 소식</div><div id="news" class="empty">불러오는 중…</div></section>
<section class="card"><div class="eyebrow">관심 단지 · 평형</div><div class="chips" id="watch"></div>
  <p class="hint">알림 기준 평형·뉴스 키워드는 저장소의 config.json에서 수정할 수 있어요.</p></section>
<footer>데이터: 국토교통부 실거래가 공개시스템 · 네이버 뉴스 검색 API<br>매일 07:00(KST) 자동 갱신 · GitHub Actions</footer>

<script>
const won = n => { const e = Math.floor(n/10000), m = n%10000;
  return m ? `${e}억 ${m.toLocaleString()}만` : `${e}억`; };
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

let CFG, DATA, AREA = "all";

function aptCard(){
  const all = DATA.trades || [];
  const areas = [...new Set(all.map(t => Math.floor(t.area)))].sort((a,b)=>a-b);
  // 기본 선택: config의 alertAreas 첫 번째 (데이터에 있으면)
  if (AREA === "init") {
    const pref = (CFG.alertAreas || [])[0];
    AREA = areas.includes(pref) ? pref : "all";
  }
  const sel = AREA === "all" ? all : all.filter(t => Math.floor(t.area) === AREA);
  const a = sel.length ? Math.round(sel.reduce((s,t)=>s+t.price,0)/sel.length) : null;

  document.getElementById("apt").innerHTML = `
    <div class="apt-head"><h2>${esc(CFG.aptDisplayName)}</h2><span class="pin">관심 1순위</span></div>
    <div class="apt-meta">${esc(CFG.aptMeta)}</div>
    <div class="area-tabs">
      <button class="${AREA==="all"?"on":""}" onclick="setArea('all')">전체</button>
      ${areas.map(x=>`<button class="${AREA===x?"on":""}" onclick="setArea(${x})">${x}㎡</button>`).join("")}
    </div>
    <div class="bigprice">
      <span class="v num">${a ? won(a) : "-"}</span>
      <span class="lbl">${AREA==="all" ? "전체 평형" : AREA+"㎡"} 최근 6개월 평균 실거래가 · ${sel.length}건</span>
    </div>
    <table><thead><tr><th>거래일</th><th>전용</th><th>층</th><th class="r">가격</th></tr></thead><tbody>
      ${sel.slice(0,12).map(x=>`<tr><td class="num">${esc(x.date)}</td><td class="num">${esc(x.area)}㎡</td><td>${esc(x.floor)}층</td><td class="r num">${won(x.price)}</td></tr>`).join("")
        || `<tr><td colspan="4" class="empty">최근 거래 없음</td></tr>`}
    </tbody></table>`;
}
function setArea(a){ AREA = a; aptCard(); }

async function load(){
  [CFG, DATA] = await Promise.all([
    fetch("config.json?t="+Date.now()).then(r=>r.json()),
    fetch("data.json?t="+Date.now()).then(r=>r.json())
  ]);

  document.getElementById("asof").textContent = DATA.asOf + " 기준";

  document.getElementById("alerts").outerHTML = DATA.alerts.map(a =>
    `<div class="alert ${esc(a.kind)}"><span class="tag">${esc(a.tag)}</span><div>${esc(a.text)}</div></div>`).join("");

  AREA = "init";
  aptCard();

  const L = DATA.listings || {};
  document.getElementById("listings").outerHTML = L.available && L.items.length
    ? `<table><thead><tr><th>면적/층</th><th>확인일</th><th class="r">호가</th></tr></thead><tbody>
        ${L.items.map(x=>`<tr><td>${esc(x.spec)}</td><td class="num">${esc(x.date)}</td><td class="r num">${esc(x.price)}</td></tr>`).join("")}
      </tbody></table>`
    : `<div class="empty">매물 수집이 아직 연결되지 않았어요. config.json의 naverComplexNo를 채우면 활성화됩니다. (그전까지는 네이버부동산·호갱노노 앱 알림 활용)</div>`;

  document.getElementById("news").outerHTML = (DATA.news||[]).map(n => `
    <div class="news">${n.link ? `<a href="${esc(n.link)}" target="_blank">${esc(n.title)}</a>` : `<a>${esc(n.title)}</a>`}
      <div class="src">${esc(n.date)} · ${esc(n.keyword)}</div></div>`).join("")
    || `<div class="empty">수집된 뉴스가 없어요.</div>`;

  document.getElementById("watch").innerHTML =
    (CFG.types||[]).map(t=>`<span class="chip">${esc(CFG.aptDisplayName)} ${esc(t)}</span>`).join("");
}
load().catch(e => document.getElementById("alerts").textContent = "데이터 로드 실패: " + e);
</script>
</body>
</html>
